version: '3.8'

services:
  # Frontend React (Vite dev server)
  taskflow-web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: taskflow-web
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    depends_on:
      - taskflow-db
    networks:
      - taskflow-network

  # Backend API (se necessario in futuro)
  taskflow-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: taskflow-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@taskflow-db:5432/taskflow
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
    depends_on:
      - taskflow-db
    networks:
      - taskflow-network
    profiles:
      - fullstack

  # Database PostgreSQL (opzionale - per sviluppo senza Supabase Cloud)
  taskflow-db:
    image: postgres:15-alpine
    container_name: taskflow-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=taskflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - taskflow-network
    profiles:
      - local-db

  # Redis (per cache e sessioni - opzionale)
  taskflow-redis:
    image: redis:7-alpine
    container_name: taskflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - taskflow-network
    profiles:
      - fullstack

  # Nginx (production)
  taskflow-nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow-nginx
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - taskflow-network
    profiles:
      - production

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  taskflow-network:
    driver: bridge
